name: Repair G09 migration

on:
  push:
    branches:
      - rescue/lane-a-g09-uncommitted-20260722
    paths:
      - .github/workflows/repair-g09-migration.yml

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: rescue/lane-a-g09-uncommitted-20260722
          fetch-depth: 0

      - name: Patch unsafe raw JSON literals
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("apps/api/alembic/versions/0026_glow_progression_spine.py")
          text = path.read_text(encoding="utf-8")

          replacements = {
              "            '{\"age_gate\":\"18+\",\"crisis_excluded\":true}',":
              "            jsonb_build_object('age_gate', '18+', 'crisis_excluded', true),",
              "            '{\"minimum_exposures\":500,\"maximum_days\":21}',":
              "            jsonb_build_object('minimum_exposures', 500, 'maximum_days', 21),",
              "            '{\"stop_on_guardrail_regression\":true}',":
              "            jsonb_build_object('stop_on_guardrail_regression', true),",
          }

          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one occurrence of {old!r}, found {count}")
              text = text.replace(old, new)

          unsafe = re.findall(r"'\{[^'\n]*(?:\":(?:true|false|null|[-+]?\d))[^'\n]*\}'", text)
          if unsafe:
              raise SystemExit(f"Unsafe JSON literals remain: {unsafe}")

          path.write_text(text, encoding="utf-8")
          PY

          rm .github/workflows/repair-g09-migration.yml
          git diff --check
          git diff -- apps/api/alembic/versions/0026_glow_progression_spine.py

      - name: Commit and push repair
        shell: bash
        run: |
          git config user.name "NUR CI Repair"
          git config user.email "actions@users.noreply.github.com"
          git add apps/api/alembic/versions/0026_glow_progression_spine.py .github/workflows/repair-g09-migration.yml
          git commit -m "fix(migration): make G09 JSON seeds SQLAlchemy-safe"
          git push origin HEAD:rescue/lane-a-g09-uncommitted-20260722

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"
        working-directory: apps/api

      - name: Ruff
        run: python -m ruff check app
        working-directory: apps/api

      - name: Full backend tests
        run: python -m pytest -q
        working-directory: apps/api
        env:
          NUR_TEST_SUPERUSER_DSN: postgresql://postgres:postgres@localhost:5432/postgres
