name: Repair G09 test contract

on:
  push:
    branches:
      - rescue/lane-a-g09-uncommitted-20260722
    paths:
      - .github/workflows/repair-g09-test-contract.yml

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: rescue/lane-a-g09-uncommitted-20260722
          fetch-depth: 0

      - name: Align stale test with server-authoritative Glow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/api/app/tests/test_track_a_vertical_slice.py")
          text = path.read_text(encoding="utf-8")
          old = '''    first = await client.post("/api/v1/glow/rewards", headers=H(client), json=payload)
              assert first.status_code == 201
              assert first.json()["awarded_points"] == 4
              assert first.json()["balance"] == 4
              assert first.json()["idempotent_replay"] is False
          '''.replace("          ", "")
          new = '''    auto_summary = await client.get("/api/v1/glow/summary")
              assert auto_summary.status_code == 200
              assert auto_summary.json()["balance"] == 4
              assert auto_summary.json()["lifetime_points"] == 4

              first = await client.post("/api/v1/glow/rewards", headers=H(client), json=payload)
              assert first.status_code == 201
              assert first.json()["awarded_points"] == 4
              assert first.json()["balance"] == 4
              assert first.json()["idempotent_replay"] is True
          '''.replace("          ", "")
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected one stale Glow assertion block, found {count}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          rm -f .github/workflows/repair-g09-test-contract.yml
          rm -f .github/workflows/diagnose-g09-final.yml
          rm -f docs/validation/g09-final-ci-trigger.md
          git diff --check
          git diff --stat

      - name: Commit and push contract repair
        shell: bash
        run: |
          git config user.name "NUR CI Repair"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "test(glow): assert server-authoritative auto-award replay"
          git push origin HEAD:rescue/lane-a-g09-uncommitted-20260722

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"
        working-directory: apps/api

      - name: Ruff
        run: python -m ruff check app
        working-directory: apps/api

      - name: Full backend tests
        shell: bash
        working-directory: apps/api
        env:
          NUR_TEST_SUPERUSER_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          set +e
          python -m pytest -q 2>&1 | tee "$GITHUB_WORKSPACE/g09-contract-pytest.txt"
          code=${PIPESTATUS[0]}
          exit "$code"

      - name: Upload backend verification output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g09-contract-pytest-${{ github.run_id }}
          path: g09-contract-pytest.txt
          retention-days: 7
