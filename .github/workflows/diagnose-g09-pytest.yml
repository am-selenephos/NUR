name: Diagnose G09 Pytest

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-diagnostic:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
        working-directory: apps/api
      - name: Run Ruff
        run: python -m ruff check app
        working-directory: apps/api
      - name: Capture pytest output
        shell: bash
        working-directory: apps/api
        env:
          NUR_TEST_SUPERUSER_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          set -o pipefail
          python -m pytest -q --tb=short 2>&1 | tee pytest-output.txt
      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g09-pytest-output-${{ github.run_id }}
          path: apps/api/pytest-output.txt
          if-no-files-found: error
          retention-days: 7
