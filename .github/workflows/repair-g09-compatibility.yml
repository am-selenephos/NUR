name: Repair G09 compatibility

on:
  push:
    branches:
      - rescue/lane-a-g09-uncommitted-20260722
    paths:
      - .github/workflows/repair-g09-compatibility.yml

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: rescue/lane-a-g09-uncommitted-20260722
          fetch-depth: 0

      - name: Restore Glow compatibility contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          glow = Path("apps/api/app/api/v1/glow.py")
          text = glow.read_text(encoding="utf-8")

          import_anchor = "from app.services.glow_service import (\n    calendar_window,"
          import_replacement = "from app.services.glow_service import (\n    award_glow,\n    calendar_window,"
          if "    award_glow,\n" not in text:
              if text.count(import_anchor) != 1:
                  raise SystemExit("Glow service import anchor changed")
              text = text.replace(import_anchor, import_replacement, 1)

          model_anchor = '''class IdempotencyIn(BaseModel):
              idempotency_key: str = Field(min_length=8, max_length=240)


          class GlowTransactionOut(BaseModel):'''.replace("          ", "")
          model_replacement = '''class IdempotencyIn(BaseModel):
              idempotency_key: str = Field(min_length=8, max_length=240)


          class GlowRewardIn(BaseModel):
              event_type: str = Field(min_length=1, max_length=80)
              source_kind: str = Field(min_length=1, max_length=80)
              source_id: uuid.UUID
              orbit_id: uuid.UUID | None = None
              idempotency_key: str = Field(min_length=8, max_length=240)


          class GlowAwardStreakOut(BaseModel):
              streak_key: str
              current_count: int
              best_count: int
              last_event_date: dt.date | None
              repairs_remaining: int

              model_config = {"from_attributes": True}


          class GlowRewardOut(BaseModel):
              transaction_id: uuid.UUID
              event_type: str
              awarded_points: int
              balance: int
              lifetime_points: int
              idempotent_replay: bool
              streak: GlowAwardStreakOut | None
              achievements_unlocked: list[str]


          class GlowTransactionOut(BaseModel):'''.replace("          ", "")
          if "class GlowRewardIn(BaseModel):" not in text:
              if text.count(model_anchor) != 1:
                  raise SystemExit("Glow model insertion anchor changed")
              text = text.replace(model_anchor, model_replacement, 1)

          route_anchor = '@router.get("/glow/summary", response_model=GlowSummaryOut)\n'
          route_block = '''@router.post(
              "/glow/rewards",
              response_model=GlowRewardOut,
              status_code=201,
              dependencies=[Depends(require_csrf)],
          )
          async def award_reward(
              payload: GlowRewardIn,
              db: Scoped,
              identity: Identity,
          ) -> GlowRewardOut:
              """Backward-compatible award endpoint backed by the hardened G09 ledger."""
              owner_user_id, _ = identity
              result = await award_glow(
                  db,
                  owner_user_id=owner_user_id,
                  event_type=payload.event_type,
                  source_kind=payload.source_kind,
                  source_id=payload.source_id,
                  orbit_id=payload.orbit_id,
                  idempotency_key=payload.idempotency_key,
              )
              await db.commit()
              return GlowRewardOut(
                  transaction_id=result.transaction.id,
                  event_type=result.transaction.event_type,
                  awarded_points=result.transaction.final_points,
                  balance=result.balance.balance,
                  lifetime_points=result.balance.lifetime_points,
                  idempotent_replay=result.idempotent_replay,
                  streak=(
                      GlowAwardStreakOut.model_validate(result.streak)
                      if result.streak
                      else None
                  ),
                  achievements_unlocked=[row.achievement_key for row in result.achievements],
              )


          '''.replace("          ", "")
          if "async def award_reward(" not in text:
              if text.count(route_anchor) != 1:
                  raise SystemExit("Glow route insertion anchor changed")
              text = text.replace(route_anchor, route_block + route_anchor, 1)

          if text.count('"/glow/rewards"') < 2:
              raise SystemExit("Expected both POST award and GET inventory Glow routes")
          glow.write_text(text, encoding="utf-8")

          migration = Path("apps/api/alembic/versions/0026_glow_progression_spine.py")
          migration_text = migration.read_text(encoding="utf-8")
          rank_replacements = {
              "(1, 'signal', 'Signal', 0,": "(1, 'signal', 'Orbit Seed', 0,",
              "(2, 'spark', 'Spark', 50,": "(2, 'spark', 'Ember', 50,",
              "(3, 'pathway', 'Pathway', 150,": "(3, 'pathway', 'Star Builder', 150,",
              "(4, 'orbit', 'Orbit', 350,": "(4, 'orbit', 'Orbit Keeper', 350,",
          }
          for old, new in rank_replacements.items():
              count = migration_text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one rank seed {old!r}, found {count}")
              migration_text = migration_text.replace(old, new, 1)
          migration.write_text(migration_text, encoding="utf-8")
          PY

          rm -f .github/workflows/repair-g09-compatibility.yml
          rm -f .github/workflows/diagnose-g09-after-fix.yml
          rm -f docs/validation/g09-fixed-ci-trigger.md
          git diff --check
          git diff --stat

      - name: Commit and push compatibility repair
        shell: bash
        run: |
          git config user.name "NUR CI Repair"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(glow): restore award API and rank compatibility"
          git push origin HEAD:rescue/lane-a-g09-uncommitted-20260722

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"
        working-directory: apps/api

      - name: Ruff
        run: python -m ruff check app
        working-directory: apps/api

      - name: Full backend tests
        shell: bash
        working-directory: apps/api
        env:
          NUR_TEST_SUPERUSER_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          set +e
          python -m pytest -q 2>&1 | tee "$GITHUB_WORKSPACE/g09-compat-pytest.txt"
          code=${PIPESTATUS[0]}
          exit "$code"

      - name: Upload backend verification output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g09-compat-pytest-${{ github.run_id }}
          path: g09-compat-pytest.txt
          retention-days: 7
