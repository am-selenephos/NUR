        w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
      }
      let a=h0, b=h1, c=h2, d=h3, e=h4, f=h5, g=h6, h=h7;
      for (let i = 0; i < 64; i += 1) {
        const S1 = rotr(e, 6) ^ rotr(e, 11) ^ rotr(e, 25);
        const choice = (e & f) ^ (~e & g);
        const t1 = (h + S1 + choice + K[i] + w[i]) >>> 0;
        const S0 = rotr(a, 2) ^ rotr(a, 13) ^ rotr(a, 22);
        const majority = (a & b) ^ (a & c) ^ (b & c);
        const t2 = (S0 + majority) >>> 0;
        h=g; g=f; f=e; e=(d + t1) >>> 0; d=c; c=b; b=a; a=(t1 + t2) >>> 0;
      }
      h0=(h0+a)>>>0; h1=(h1+b)>>>0; h2=(h2+c)>>>0; h3=(h3+d)>>>0;
      h4=(h4+e)>>>0; h5=(h5+f)>>>0; h6=(h6+g)>>>0; h7=(h7+h)>>>0;
    }
    return [h0,h1,h2,h3,h4,h5,h6,h7].map(value => value.toString(16).padStart(8, "0")).join("");
  }

  async function sha256(text) {
    if (globalThis.crypto?.subtle?.digest) {
      const digest = await globalThis.crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, "0")).join("");
    }
    return sha256Fallback(text);
  }

  function safeContext(raw = {}) {
    const text = value => typeof value === "string" ? value.trim().slice(0, 160) : "";
    return Object.freeze({
      displayName: text(raw.displayName),
      email: text(raw.email),
      direction: text(raw.direction),
      source: text(raw.source) || "prototype"
    });
  }

  function onboardingContext() {
    const doc = entryFrame.contentDocument;
    return safeContext({
      displayName: doc?.getElementById("f4-name")?.value || "",
      email: doc?.getElementById("f4-email")?.value || "",
      direction: doc?.querySelector(".f4-chip.sel")?.textContent || "",
      source: "onboarding"
    });
  }

  function publishSessionContext() {
    if (!universeLoaded || !universeFrame.contentWindow) return;
    const UniverseCustomEvent = universeFrame.contentWindow.CustomEvent;
    universeFrame.contentWindow.dispatchEvent(
      new UniverseCustomEvent("nur:session-context", { detail: currentContext })
    );
  }

  function revealUniverse() {
    universeFrame.style.display = "block";
    universeFrame.removeAttribute("aria-hidden");
    requestAnimationFrame(() => universeFrame.classList.add("is-visible"));
    window.setTimeout(() => {
      entryFrame.classList.add("is-exiting");
      entryFrame.setAttribute("aria-hidden", "true");
      entryFrame.setAttribute("inert", "");
      veil.classList.remove("is-active");
      currentStage = "universe";
      publishSessionContext();
      window.dispatchEvent(new CustomEvent("nur:entered-universe", { detail: currentContext }));
    }, 90);
  }

  function enterUniverse(raw = {}) {
    currentContext = safeContext(raw);
    veil.classList.add("is-active");
    if (universeLoaded) {
      revealUniverse();
      return;
    }
    universeFrame.addEventListener("load", () => {
      universeLoaded = true;
      window.setTimeout(revealUniverse, 70);
    }, { once:true });
    universeFrame.srcdoc = universeSource;
  }

  function showEntry() {
    if (currentStage === "entry") return;
    veil.classList.add("is-active");
    universeFrame.classList.remove("is-visible");
    universeFrame.setAttribute("aria-hidden", "true");
    window.setTimeout(() => {
      universeFrame.style.display = "none";
      entryFrame.style.display = "block";
      entryFrame.removeAttribute("aria-hidden");
      entryFrame.removeAttribute("inert");
      requestAnimationFrame(() => entryFrame.classList.remove("is-exiting"));
      currentStage = "entry";
      veil.classList.remove("is-active");
    }, 260);
  }

  function bindEntryBridge() {
    const childWindow = entryFrame.contentWindow;
    const childDocument = entryFrame.contentDocument;
    if (!childWindow || !childDocument || entryFrame.dataset.bridgeBound === "true") return;
    entryFrame.dataset.bridgeBound = "true";

    childWindow.addEventListener("nur:signin-request", event => {
      const detail = safeContext({
        email: event.detail?.email || "",
        source: "signin"
      });
      window.dispatchEvent(new CustomEvent("nur:signin-request", { detail }));
    });

    const returnToSky = childDocument.getElementById("f4-return");
    returnToSky?.addEventListener("click", event => {
      event.preventDefault();
      event.stopImmediatePropagation();
      enterUniverse(onboardingContext());
    }, true);
  }

  async function verifySources() {
    const [entryHash, universeHash] = await Promise.all([
      sha256(entrySource),
      sha256(universeSource)
    ]);
    const result = Object.freeze({
      entry: { expected: MANIFEST.entry.sha256, actual: entryHash, pass: entryHash === MANIFEST.entry.sha256 },
      universe: { expected: MANIFEST.universe.sha256, actual: universeHash, pass: universeHash === MANIFEST.universe.sha256 },
      pass: entryHash === MANIFEST.entry.sha256 && universeHash === MANIFEST.universe.sha256
    });
    document.documentElement.dataset.nurIntegrity = result.pass ? "pass" : "fail";
    return result;
  }

  entrySource = decodeUtf8(ENTRY_SOURCE_B64);
  universeSource = decodeUtf8(UNIVERSE_SOURCE_B64);

  entryFrame.addEventListener("load", bindEntryBridge, { once:true });
  entryFrame.srcdoc = entrySource;

  window.NURConsolidated = Object.freeze({
    manifest: MANIFEST,
    verifySources,
    enterUniverse,
    completeSignIn: profile => enterUniverse(safeContext({ ...profile, source:"signin" })),
    showEntry,
    getStage: () => currentStage,
    getSessionContext: () => currentContext
  });
})();
</script>
